<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="renderer" content="webkit" />

        <link rel="stylesheet" href="/style.css" />
        <link rel="icon" type="image/png" href="/favicon.ico" />

        <title>卡戎博客 - 设计，不止视觉</title>

        <meta name="description" content="卡戎的个人网站。技术、设计、软件分享和碎碎念。">

        <style>
            body {
                padding: 0;
            }
            .cover-line {
                overflow: hidden;
                margin: 0 auto;
                width: 100%;
                max-width: 135rem;
                height: 36rem;
                box-sizing: border-box;
                padding-top: 6rem;
                padding-left: 50%;
                background-image: url("cover.webp");
                background-size: cover;
                background-position: center;
                color: white;
                text-shadow: 0 0 4rem rgba(0, 0, 0, 0.5);
                font-family: Helvetica, Arial, sans-serif;
            }
            .cover-line .website-name {
                font-size: 1.2rem;
                font-weight: bold;
                background-color: white;
                color: #2f3740;
                padding: 0.3rem 1.2rem;
                border-radius: 99rem;
                display: inline-block;
            }
            .cover-line h1 {
                font-weight: bold;
                font-size: 5rem;
                margin: 1rem 0 2rem 0;
                padding: 0;
                line-height: 1;
            }
            .cover-line .cards {
                width: 100%;
                max-width: 35rem;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 1rem;
            }
            .cover-line .cards .card {
                display: grid;
                width: 15rem;
                height: 6rem;
                border-radius: 1rem;
                backdrop-filter: blur(10px);
                background-color: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.3);
                grid-template-columns: 3fr 7fr;
                grid-template-rows: 5fr 4fr;
                grid-column-gap: 1rem;
                transition:
                    background-color 0.2s,
                    border-color 0.2s;
            }
            .cover-line .cards .card:hover {
                background-color: rgba(255, 255, 255, 0.2);
                border-color: rgba(255, 255, 255, 0.5);
                cursor: pointer;
            }
            .cover-line .cards .card .icon {
                grid-row: 1 / 3;
                justify-self: end;
                align-self: center;
                width: 3rem;
                height: 3rem;
                fill: white;
            }
            .cover-line .cards .card .title {
                align-self: end;
                margin: 0;
            }
            .cover-line .cards .card .detail {
                font-size: 0.8rem;
            }
            .main-flow {
                width: 100%;
                margin: 4rem auto 0 auto;
                display: flex;
                gap: 4rem;
                align-items: flex-start;
                justify-content: center;
            }
            .article-list {
                display: flex;
                flex-direction: column;
                gap: 3rem;
                width: 100%;
                max-width: 42rem;
            }
            .site-info {
                position: sticky;
                top: 6rem;
                width: 16rem;
                display: flex;
                flex-direction: column;
                gap: 2rem;
            }
            .site-info h2 {
                font-weight: normal;
                font-size: 1.2rem;
                margin: 1rem 0 0.5rem 0;
            }
            .site-info p {
                margin: 0 0 1rem 0;
                font-size: 0.7rem;
                line-height: 1.5;
                color: #999;
            }
            .site-info .filter .filter-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            @media (max-width: 800px) {
                body {
                    padding: 0 .5rem;
                }
                .main-flow {
                    margin-top: 1rem;
                }
                .cover-line {
                    display: none;
                }
                .site-info {
                    display: none; /* 日后改成从侧边通过菜单按钮弹出 */
                }
            }
        </style>
    </head>

    <body>
        <script type="module" src="/components/site-header.js"></script>
        <site-header></site-header>

        <div class="cover-line">
            <div class="website-name">卡戎博客</div>
            <h1>设计, 不止视觉</h1>
            <div class="cards">
                <div class="card">
                    <img
                        class="icon"
                        src="/assets/icons/terminal_24dp_FFF_FILL0_wght400_GRAD0_opsz24.svg"
                    />
                    <h2 class="title">设计和技术</h2>
                    <div class="detail">视觉、产品和运营</div>
                </div>
                <div class="card">
                    <img
                        class="icon"
                        src="/assets/icons/apps_24dp_FFF_FILL0_wght400_GRAD0_opsz24.svg"
                    />
                    <h2 class="title">软件分享</h2>
                    <div class="detail">Win、Android 和 Web</div>
                </div>
                <div class="card">
                    <img
                        class="icon"
                        src="/assets/icons/favorite_24dp_FFF_FILL0_wght400_GRAD0_opsz24.svg"
                    />
                    <h2 class="title">爱和性</h2>
                    <div class="detail">关于情感和性的分享</div>
                </div>
                <div class="card">
                    <img
                        class="icon"
                        src="/assets/icons/lightbulb_2_24dp_FFF_FILL0_wght400_GRAD0_opsz24.svg"
                    />
                    <h2 class="title">碎碎念</h2>
                    <div class="detail">Yes, but who care?</div>
                </div>
            </div>
        </div>

        <div class="main-flow">
            <script type="module" src="/components/article-card.js"></script>
            <div class="article-list"></div>
            <div class="site-info">
                <script type="module" src="/components/owner-info.js"></script>
                <owner-info></owner-info>
                <div class="filter">
                    <h2>筛选Filter</h2>
                    <div class="filter-tags">
                        <!--  之后将转为 WebComponents，此处仅作开发时预览效果使用 -->
                        <style>
                            .filter .tag {
                                font-size: 0.75rem;
                                line-height: 0.75rem;
                                border-radius: 999rem;
                                background-color: #ff000020;
                                color: #bb0000d0;
                                padding: 0.25rem 0.5rem;
                            }
                        </style>
                        <div class="tag">Windows</div>
                        <div class="tag">系统</div>
                        <div class="tag">设计</div>
                        <div class="tag">软件分享</div>
                        <div class="tag">情感</div>
                        <div class="tag">性</div>
                        <div class="tag">政治</div>
                        <div class="tag">碎碎念</div>
                        <div class="tag">安卓</div>
                        <div class="tag">Windows</div>
                        <div class="tag">Linux</div>
                        <div class="tag">网站分享</div>
                        <div class="tag">二次元</div>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="/components/site-footer.js"></script>
        <site-footer></site-footer>

        <script>
            const articleList = document.querySelector(".article-list");
            fetch("/articles.json").then((response) => response.json()).then((articles) => {
                articles.forEach((article) => {
                    const articleCard = document.createElement("article-card");
                    articleCard.classList.add("ripple");
                    articleCard.setAttribute("title",   article.title   || "No Title");
                    articleCard.setAttribute("preview", article.preview || "");
                    articleCard.setAttribute("time",    article.time    || "");
                    articleCard.setAttribute("tags",    article.tags    || "");
                    articleCard.setAttribute("url",     article.url     || "");
                    articleList.appendChild(articleCard);

                    if (article.cover) {
                        articleCard.setAttribute("cover", article.cover);
                        return;
                    }

                    // 尝试寻找默认封面
                    const defaultCover = `/articles/${encodeURIComponent(article.title)}/cover.webp`;
                    fetch(defaultCover, { method: "HEAD" }).then((res) => {
                        if (res.ok) {
                            articleCard.setAttribute("cover", defaultCover);
                        }
                    })
                    .catch(() => { /* 若无则不传入封面 */ })
                });
            })
            .catch((error) => {
                console.error("Error fetching articles:", error);
            });
        </script>
    </body>
</html>
