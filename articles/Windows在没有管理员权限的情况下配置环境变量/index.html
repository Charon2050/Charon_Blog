<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="renderer" content="webkit" />
        <link rel="stylesheet" href="/style.css" />
        <link rel="icon" type="image/png" href="/favicon.ico" />
        <title>Windows在没有管理员权限的情况下配置环境变量</title>
        <meta
            name="description"
            content="使用 rundll32 sysdm.cpl,EditEnvironmentVariables 命令在无管理员权限的情况下以用户权限打开环境变量设置窗口"
        />
    </head>

    <body>
        <script type="module" src="/components/article-page.js"></script>
        <article-page>
            <h1>Windows在没有管理员权限的情况下配置环境变量</h1>
            <p>
                Windows在没有管理员权限时，无法打开「高级系统设置」窗口，因此难以配置<a target="_blank" href="https://chatgpt.com/?prompt=请通俗易懂的介绍：环境变量">环境变量</a>。这种情况下，可以使用命令行打开环境变量编辑窗口。
            </p>
            <p>
                按下 Win+R，运行：
                <code>rundll32 sysdm.cpl,EditEnvironmentVariables</code>
                ，即可配置用户级环境变量。
            </p>
            <img
                src="/articles/Windows在没有管理员权限的情况下配置环境变量/cover.webp"
            />
            <p>当用户级变量与系统级变量冲突时，用户级变量优先生效。</p>
        </article-page>
    </body>
</html>
