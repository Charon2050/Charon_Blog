        <script>
            // 初始化
            let articleDict = JSON.parse(localStorage.getItem("mdeditor_article_dict"));
            /*{
              "title_id": "# title\ncontents...",
              ...
            }*/
            if (!articleDict) {
                articleDict = {};
            }
            // 从 articleDict 获取第一个的KEY
            const articleId = articleDict[0]?.title_id ?? 'defaultArticle';
            const md = window.markdownit();
            const editor = document.querySelector('#editor');
            const preview = document.querySelector('#preview');

            // 从 articleId 中获取内容
            editor.value = articleDict[articleId] ?? `# Markdown编辑器

**Markdown** 是一种轻量级标记语言，核心设计理念是 **“易读易写”** —— 使用纯文本格式书写，却能创建包含多种样式的文档。你可以在任何纯文本编辑器中编写 Markdown，无需依赖复杂的排版工具。

## 为什么Markdown受欢迎？

- **专注内容**：无需纠结格式，让写作回归本质。
- **跨平台兼容**：几乎所有的代码托管平台（如 GitHub）、笔记软件（如 Obsidian）和静态网站生成器都原生支持。
- **AI首选**：纯文本格式易于LLM读取，是AI读写的默认格式。

---

**常用语法速览**

| 类型 | 示例 |
| :--- | :--- |
| 粗体 | \`**粗体文字**\` → **粗体文字** |
| 斜体 | \`*斜体文字*\` → *斜体文字* |
| 代码 | \`\` \`inline code\` \`\` → \`inline code\` |
| 链接 | \`[标题](url)\` → [Markdown 官网](https://daringfireball.net/projects/markdown/) |

> 提示：大多数编辑器都支持快捷键（如 \`Ctrl+B\` 加粗），上手非常轻松。

---

**代码块示例（Python）**

\`\`\`python
def greet(name):
    """输出友好的欢迎信息"""
    print(f"欢迎使用 Markdown，{name}！")

            preview.innerHTML = md.render(editor.value);

            // 输入事件
            editor.addEventListener('input', () => {
                // 渲染
                preview.innerHTML = md.render(editor.value);
                // 保存
                articleDict[articleId] = editor.value;
                localStorage.setItem("mdeditor_article_dict", JSON.stringify(articleDict));
            });

            // 成对符号补全
            function attachPairCompleter(textarea) {
              const pairs = {
                "(": ")",
                "{": "}",
                "[": "]",
                '"': '"',
                "“": "”",
                "（": "）",
                "【": "】",
                "`": "`"
              };

              const opens = new Set(Object.keys(pairs));

              let composing = false;

              textarea.addEventListener("compositionstart", () => {
                composing = true;
              });

              textarea.addEventListener("compositionend", () => {
                composing = false;
              });

              function handleInsert(e) {
                const ch = e.data;
                if (!ch || !opens.has(ch)) return;

                const close = pairs[ch];

                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;

                const value = textarea.value;

                e.preventDefault();

                const before = value.slice(0, start);
                const selected = value.slice(start, end);
                const after = value.slice(end);

                textarea.value = before + ch + selected + close + after;

                const cursorPos = selected.length
                  ? start + ch.length + selected.length + close.length
                  : start + ch.length;

                textarea.selectionStart = textarea.selectionEnd = cursorPos;
              }

              textarea.addEventListener("beforeinput", (e) => {
                if (e.inputType === "insertText") {
                  handleInsert(e);
                  return;
                }

                // composition 阶段“延迟到下一帧处理”
                if (e.inputType === "insertCompositionText") {
                  queueMicrotask(() => {
                    const last = textarea.value[textarea.selectionStart - 1];
                    if (opens.has(last)) {
                      const close = pairs[last];

                      const pos = textarea.selectionStart;

                      textarea.value =
                        textarea.value.slice(0, pos) +
                        close +
                        textarea.value.slice(pos);

                      textarea.selectionStart = textarea.selectionEnd = pos;
                    }
                  });
                }
              });
            }
            attachPairCompleter(editor);
        </script>
